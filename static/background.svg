<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cinematicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="overlay" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#cinematicGradient)" />
  <circle cx="20%" cy="20%" r="100" fill="url(#overlay)" opacity="0.3" />
  <circle cx="80%" cy="70%" r="150" fill="url(#overlay)" opacity="0.2" />
  <circle cx="50%" cy="50%" r="200" fill="url(#overlay)" opacity="0.1" />
</svg>